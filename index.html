<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lazzerex's Blog</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
</head>

<body>
    <header>
        <nav class="container">
            <a href="#" class="logo">Lazzerex's Blog</a>
            <ul class="nav-links">
                <li><a href="#home">Home</a></li>
                <li><a href="#blog">Blog</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
        </nav>
    </header>

    <section class="hero" id="home">
        <div class="hero-bg"></div>
        <div class="hero-content">
            <h1>Tech, Science & Sound</h1>
            <p>My personal blog where I write about the latest trends in technology, diving deep into scientific
                discoveries, and jamming through the worlds of music and gaming.</p>
            <a href="#blog" class="cta-button">Dive In</a>
        </div>
    </section>

    <section class="blog-section" id="blog">
        <div class="container">
            <h2 class="section-title scroll-animate">My Posts</h2>
            <div class="blog-grid" id="blogGrid">
                <!-- Blog posts will be inserted here by JavaScript -->
            </div>
            
            <!-- Pagination Controls -->
            <div class="pagination" id="pagination">
                <button id="prevBtn" onclick="changePage(-1)">← Previous</button>
                <div id="pageNumbers"></div>
                <button id="nextBtn" onclick="changePage(1)">Next →</button>
                <span class="pagination-info" id="pageInfo"></span>
            </div>
        </div>
    </section>

    <footer>
        <div class="container">
            <div class="footer-content">
                <p>&copy; 2025 Lazzerex's Blog.</p>
                <div class="social-links">
                    <a href="https://github.com/lazzerex" target="_blank">GitHub</a>
                </div>
            </div>
        </div>
    </footer>

    <script src="blog.js"></script>
    <script src="script.js"></script>
</body>

</html>
